name: Daily Job Search

on:
  schedule:
    - cron: '7 7 * * *'
      timezone: 'America/Vancouver'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  job-search:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Ensure history directory exists
        run: |
          mkdir -p .job_history
          for file in sent_jobs_pm.json sent_jobs_marketing.json sent_jobs_admin.json; do
            if [ ! -f ".job_history/$file" ]; then
              echo "[]" > ".job_history/$file"
            fi
          done

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run job search script
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
          RESUME_PM_CONTENT: ${{ secrets.RESUME_PM_CONTENT }}
          RESUME_MARKETING_CONTENT: ${{ secrets.RESUME_MARKETING_CONTENT }}
          RESUME_ADMIN_CONTENT: ${{ secrets.RESUME_ADMIN_CONTENT }}
          LATITUDE: ${{ secrets.LATITUDE }}
          LONGITUDE: ${{ secrets.LONGITUDE }}
        run: |
          python job_search.py

      - name: Commit sent job history
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .job_history/sent_jobs_pm.json
          git add .job_history/sent_jobs_marketing.json
          git add .job_history/sent_jobs_admin.json

          if ! git diff --cached --quiet; then
            git commit -m "Update sent job history"
            git push
          else
            echo "No changes to commit"
          fi

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: job-search-logs-${{ github.run_number }}
          path: |
            *.log
            jobs_*.json
            .job_history/*.json
          retention-days: 30
          if-no-files-found: warn
